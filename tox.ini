[tox]
envlist =
    py{312,313,314}-django52-wagtail{72,73,74}
    py{312,313,314}-django60-wagtail{73,74}
isolated_build = True
skip_missing_interpreters = True

[testenv]
extras = localize
deps =
    django52: Django>=5.2,<5.3
    django60: Django>=6.0,<6.1
    wagtail72: Wagtail>=7.2,<7.3
    wagtail73: Wagtail>=7.3,<7.4
    wagtail74: Wagtail>=7.4,<7.5
    pytest>=8.0.0
    pytest-django>=4.8.0
    pytest-cov>=4.0.0
    factory-boy>=3.3.0

commands = pytest --no-migrations {posargs}

setenv =
    PYTHONPATH = {toxinidir}/src
    DJANGO_SETTINGS_MODULE = tests.settings

[testenv:lint]
deps = 
    ruff>=0.1.0
commands = 
    ruff check src/
    ruff format --check src/

[testenv:format]
deps = 
    ruff>=0.1.0
commands = 
    ruff format src/
    ruff check --fix src/

[testenv:coverage]
extras = localize
deps =
    {[testenv]deps}
    coverage[toml]
commands =
    coverage erase
    coverage run -m pytest --no-migrations {posargs}
    coverage report
    coverage html

[gh-actions]
python =
    3.12: py312
    3.13: py313
    3.14: py314